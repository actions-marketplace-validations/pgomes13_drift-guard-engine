name: API Contract Guard

on:
  pull_request:
    branches: [main, master]
    paths:
      # Trigger only when OpenAPI schema files change.
      # Adjust these globs to match where your spec files live.
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.json'

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments

jobs:
  schema-diff:
    name: Detect API Breaking Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch (head)
        uses: actions/checkout@v4
        with:
          path: head

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: head/go.sum

      - name: Build diff engine
        working-directory: head
        run: go build -o /usr/local/bin/diffengine ./cmd/diffengine

      # ---------------------------------------------------------------
      # Detect which schema file(s) changed in this PR.
      # If you have a single well-known spec file, replace the
      # SCHEMA_FILE env var below with its fixed path.
      # ---------------------------------------------------------------
      - name: Find changed schema files
        id: changed
        run: |
          cd head
          # List files changed in this PR that look like OpenAPI specs
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(yaml|yml|json)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run schema diff (text summary)
        id: diff
        if: steps.changed.outputs.files != ''
        run: |
          SUMMARY=""
          HAS_BREAKING=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            BASE_FILE="base/$file"
            HEAD_FILE="head/$file"

            # File added in PR — no base to compare
            if [ ! -f "$BASE_FILE" ]; then
              echo "::notice title=New Schema::$file is a new schema file — no base to compare"
              continue
            fi

            # File deleted in PR
            if [ ! -f "$HEAD_FILE" ]; then
              echo "::error title=Schema Deleted::$file was deleted in this PR"
              HAS_BREAKING=true
              continue
            fi

            # Run the diff engine in github annotation mode
            diffengine \
              --base "$BASE_FILE" \
              --head "$HEAD_FILE" \
              --format github

            # Also capture JSON for the PR comment
            JSON=$(diffengine --base "$BASE_FILE" --head "$HEAD_FILE" --format json)
            BREAKING=$(echo "$JSON" | jq '.summary.breaking')
            NON_BREAKING=$(echo "$JSON" | jq '.summary.non_breaking')
            TOTAL=$(echo "$JSON" | jq '.summary.total')

            SUMMARY="${SUMMARY}\n### \`$file\`\n"
            SUMMARY="${SUMMARY}| Metric | Count |\n|---|---|\n"
            SUMMARY="${SUMMARY}| Total changes | $TOTAL |\n"
            SUMMARY="${SUMMARY}| Breaking | $BREAKING |\n"
            SUMMARY="${SUMMARY}| Non-Breaking | $NON_BREAKING |\n\n"

            if [ "$BREAKING" -gt 0 ]; then
              HAS_BREAKING=true
              # Append breaking change details
              SUMMARY="${SUMMARY}<details><summary>Breaking changes</summary>\n\n\`\`\`json\n"
              SUMMARY="${SUMMARY}$(echo "$JSON" | jq '[.changes[] | select(.severity=="breaking")]')\n"
              SUMMARY="${SUMMARY}\`\`\`\n</details>\n\n"
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          printf "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "has_breaking=$HAS_BREAKING" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.changed.outputs.files != '' && steps.diff.outputs.summary != ''
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.diff.outputs.summary }}`;
            const hasBreaking = '${{ steps.diff.outputs.has_breaking }}' === 'true';

            const header = hasBreaking
              ? '## API Contract Guard — Breaking Changes Detected'
              : '## API Contract Guard — No Breaking Changes';

            const body = `${header}\n\n${summary}\n\n---\n_Generated by [drift-guard-diff-engine](https://github.com/${{ github.repository }})_`;

            // Find existing bot comment to update instead of spamming new ones
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('API Contract Guard')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if breaking changes detected
        if: steps.diff.outputs.has_breaking == 'true'
        run: |
          echo "Breaking API changes detected. Review the PR comment for details."
          exit 1
