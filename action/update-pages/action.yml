name: Update drift log on GitHub Pages
description: Creates and updates a GitHub Pages site with a log of API drift checks.

runs:
  using: composite
  steps:
    - name: Update drift log
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_URL: ${{ github.event.pull_request.html_url }}
      run: |
        [ -s /tmp/drift-output.txt ] || exit 0

        REPO="${{ github.repository }}"
        TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

        # Detect configured Pages branch; fall back to gh-pages.
        if ! PAGES_BRANCH=$(gh api "repos/${REPO}/pages" --jq '.source.branch' 2>/dev/null); then
          PAGES_BRANCH="gh-pages"
        fi

        # Build HTML body from markdown output (base64-encoded converter).
        printf '%s' '' | base64 -d > /tmp/md2html.py
        BODY=$(cat /tmp/drift-output.txt | python3 /tmp/md2html.py)
        printf '%s' "$BODY" > /tmp/entry-body.html

        # Parse summary numbers from markdown output.
        python3 "${GITHUB_ACTION_PATH}/parse_summary.py"
        TOTAL=$(sed -n '1p' /tmp/summary.txt)
        BREAKING=$(sed -n '2p' /tmp/summary.txt)
        NON_BREAKING=$(sed -n '3p' /tmp/summary.txt)
        INFO=$(sed -n '4p' /tmp/summary.txt)

        # Write new entry metadata as JSON.
        jq -n \
          --argjson pr      "$PR_NUMBER"   \
          --arg     url     "$PR_URL"      \
          --arg     ts      "$TIMESTAMP"   \
          --argjson total   "$TOTAL"       \
          --argjson breaking     "$BREAKING"    \
          --argjson non_breaking "$NON_BREAKING" \
          --argjson info    "$INFO"        \
          '{pr:$pr,url:$url,timestamp:$ts,total:$total,breaking:$breaking,non_breaking:$non_breaking,info:$info}' \
          > /tmp/new-entry.json

        # Fetch existing drift-log.json.
        if gh api "repos/${REPO}/contents/drift-log.json?ref=${PAGES_BRANCH}" > /tmp/log-file.json 2>/dev/null; then
          LOG_SHA=$(jq -r '.sha' /tmp/log-file.json)
          jq -r '.content' /tmp/log-file.json | tr -d '\n' | base64 -d > /tmp/drift-log-existing.json
        else
          LOG_SHA=""
          echo '[]' > /tmp/drift-log-existing.json
        fi

        # Merge entry into drift-log.json and regenerate index.html.
        python3 "${GITHUB_ACTION_PATH}/update_log.py"

        # Commit drift-log.json.
        ENCODED_LOG=$(base64 -w 0 /tmp/drift-log-new.json)
        LOG_ARGS=(
          --method PUT "repos/${REPO}/contents/drift-log.json"
          -f "message=chore: update drift log"
          -f "content=${ENCODED_LOG}"
          -f "branch=${PAGES_BRANCH}"
        )
        [ -n "$LOG_SHA" ] && LOG_ARGS+=(-f "sha=${LOG_SHA}")
        gh api "${LOG_ARGS[@]}" > /dev/null || true

        # Commit index.html.
        if gh api "repos/${REPO}/contents/index.html?ref=${PAGES_BRANCH}" > /tmp/pages-file.json 2>/dev/null; then
          FILE_SHA=$(jq -r '.sha' /tmp/pages-file.json)
        else
          FILE_SHA=""
        fi
        ENCODED=$(base64 -w 0 /tmp/new-index.html)
        PUT_ARGS=(
          --method PUT "repos/${REPO}/contents/index.html"
          -f "message=chore: update drift log"
          -f "content=${ENCODED}"
          -f "branch=${PAGES_BRANCH}"
        )
        [ -n "$FILE_SHA" ] && PUT_ARGS+=(-f "sha=${FILE_SHA}")
        gh api "${PUT_ARGS[@]}" > /dev/null || true
