name: drift-guard
description: Detect breaking API changes between the current branch and the base branch.
author: pgomes13

inputs:
  node-version:
    description: Node.js version to use for generating the OpenAPI spec.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: pgomes13/drift-guard-engine/action/setup-deps@v1
      with:
        node-version: ${{ inputs.node-version }}

    - uses: pgomes13/drift-guard-engine/action/setup-database@v1

    - uses: pgomes13/drift-guard-engine/action/install-binary@v1

    - uses: pgomes13/drift-guard-engine/action/compare@v1

    - uses: pgomes13/drift-guard-engine/action/update-pages@v1

branding:
  icon: shield
  color: blue
