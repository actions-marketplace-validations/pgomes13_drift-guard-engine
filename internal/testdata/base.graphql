type Query {
  user(id: ID!): User
  users(limit: Int, offset: Int): [User!]!
  search(query: String!): SearchResult
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!
}

type User {
  id: ID!
  email: String!
  name: String
  role: UserRole!
  address: Address
}

type Address {
  street: String!
  city: String!
  country: String!
}

enum UserRole {
  ADMIN
  VIEWER
  EDITOR
}

input CreateUserInput {
  email: String!
  name: String
  role: UserRole
}

input UpdateUserInput {
  name: String
  role: UserRole
}

union SearchResult = User | Address

interface Node {
  id: ID!
}
